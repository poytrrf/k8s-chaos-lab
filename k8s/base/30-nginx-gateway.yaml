apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-config
  namespace: chaos-lab
data:
  default.conf: |
    server {
      listen 80;

      location /service-a/ {
        proxy_pass http://service-a.chaos-lab.svc.cluster.local/;
        proxy_set_header Host $host;
      }

      location /service-b/ {
        proxy_pass http://service-b.chaos-lab.svc.cluster.local/;
        proxy_set_header Host $host;
      }

      location /healthz {
        return 200 "gateway ok\n";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: chaos-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: chaos-lab
spec:
  type: NodePort
  selector:
    app: nginx-gateway
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
